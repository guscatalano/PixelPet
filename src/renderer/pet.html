<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <title>PixelPet</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        /* No text selection / drag ghosting when interacting with the pet. */
        user-select: none;
        -webkit-user-select: none;
      }
      /* Belt-and-suspenders: never render a scrollbar in the pet overlay. */
      ::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }
      /* Pin the canvas out of normal flow so it can't overflow the viewport. */
      #pet {
        position: fixed;
        top: 0;
        left: 0;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        cursor: grab;
      }
      #pet.dragging {
        cursor: grabbing;
      }
    </style>
  </head>
  <body>
    <canvas id="pet"></canvas>
    <script type="module" src="./pet/main.ts"></script>
  </body>
</html>
