<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <title>PixelPet Settings</title>
    <style>
      :root {
        --bg: #1a1b24;
        --panel: #23252f;
        --panel-2: #2b2d39;
        --hair: #34364a;
        --ink: #e7e8f0;
        --dim: #9a9db4;
        --faint: #6d7089;
        --accent: #f3c73e;
        --accent-soft: rgba(243, 199, 62, 0.16);
        --sans: 'Segoe UI Variable Display', 'Segoe UI', system-ui, sans-serif;
        --mono: 'Cascadia Code', ui-monospace, 'Consolas', monospace;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        font-size: 14px;
        line-height: 1.5;
        overflow-y: auto;
        user-select: none;
        -webkit-user-select: none;
      }
      .wrap { max-width: 680px; margin: 0 auto; padding: 22px 24px 40px; }
      h1 { font-size: 19px; font-weight: 650; letter-spacing: -0.01em; }
      .sub { color: var(--dim); font-size: 12.5px; margin-top: 2px; }
      section { margin-top: 26px; }
      .label {
        font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--faint); margin-bottom: 12px;
      }

      /* Pet grid */
      .grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
        gap: 10px;
      }
      .card {
        background: var(--panel); border: 1.5px solid var(--hair); border-radius: 12px;
        padding: 10px 8px 8px; display: flex; flex-direction: column; align-items: center;
        gap: 6px; cursor: pointer; transition: border-color 0.12s, background 0.12s, transform 0.08s;
      }
      .card:hover { border-color: var(--faint); transform: translateY(-1px); }
      .card.active { border-color: var(--accent); background: var(--accent-soft); }
      .card canvas {
        width: 72px; height: 72px; image-rendering: pixelated;
        background: radial-gradient(60% 60% at 50% 45%, #30323f, #24262f); border-radius: 8px;
      }
      .card .nm { font-size: 12.5px; font-weight: 600; }
      .card.active .nm { color: var(--accent); }

      /* Size segmented control */
      .seg { display: inline-flex; border: 1px solid var(--hair); border-radius: 10px; overflow: hidden; }
      .seg button {
        font-family: var(--sans); font-size: 13px; color: var(--ink); background: transparent;
        border: 0; border-left: 1px solid var(--hair); padding: 8px 16px; cursor: pointer;
      }
      .seg button:first-child { border-left: 0; }
      .seg button.on { background: var(--accent-soft); color: var(--accent); }
      .seg button:hover:not(.on) { background: var(--panel-2); }

      /* Personality sliders */
      .traits { background: var(--panel); border: 1px solid var(--hair); border-radius: 12px; padding: 16px 18px; }
      .trow { display: grid; grid-template-columns: 92px 1fr 34px; align-items: center; gap: 12px; padding: 5px 0; }
      .trow .tn { font-size: 13px; color: var(--dim); text-transform: capitalize; }
      .trow .tv { font-family: var(--mono); font-size: 12px; color: var(--faint); text-align: right; font-variant-numeric: tabular-nums; }
      input[type='range'] { -webkit-appearance: none; appearance: none; height: 5px; border-radius: 3px; background: var(--hair); outline: none; }
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none; width: 15px; height: 15px; border-radius: 50%;
        background: var(--accent); cursor: pointer; border: 2px solid var(--bg);
      }
      .traits-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
      .traits-head .who { font-size: 13px; color: var(--ink); }
      .traits-head .who b { color: var(--accent); }
      .link { background: none; border: 0; color: var(--faint); font-size: 12px; cursor: pointer; font-family: var(--sans); }
      .link:hover { color: var(--accent); text-decoration: underline; }

      /* Pose previews */
      .poses { display: flex; gap: 12px; flex-wrap: wrap; }
      .pose {
        background: var(--panel); border: 1px solid var(--hair); border-radius: 12px;
        padding: 10px 10px 8px; display: flex; flex-direction: column; align-items: center; gap: 7px; flex: 1; min-width: 104px;
      }
      .pose canvas {
        width: 104px; height: 104px; image-rendering: pixelated;
        background: radial-gradient(60% 60% at 50% 55%, #30323f, #23252f); border-radius: 8px;
      }
      .pose .pl { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>PixelPet Settings</h1>
      <div class="sub">Pick your desktop cat, size it, and tune how it behaves.</div>

      <section>
        <div class="label">Your pet</div>
        <div class="grid" id="grid"></div>
      </section>

      <section>
        <div class="label">Poses &middot; <span id="poseWho">Ash</span></div>
        <div class="poses" id="poses"></div>
      </section>

      <section>
        <div class="label">Size</div>
        <div class="seg" id="sizes"></div>
      </section>

      <section>
        <div class="label">Personality</div>
        <div class="traits">
          <div class="traits-head">
            <div class="who">Tuning <b id="who">Ash</b></div>
            <button class="link" id="reset">Reset to defaults</button>
          </div>
          <div id="rows"></div>
        </div>
      </section>
    </div>
    <script type="module" src="./settings/main.ts"></script>
  </body>
</html>
